<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FOR WONDERFULL SHERY</title>

    <link rel="icon" href="assets/images/favicon.png">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="petals"></div>


<!-- Loading -->

<section id="loading" class="screen active">

    <div class="card">

        <img src="assets/images/bow.png" class="bow">

        <h1 class="title">

            Welcome

            <span>SHERY</span>

        </h1>

        <p class="subtitle">

            I made something special...

            just for you❤️

        </p>

        <div class="progress">

            <div id="progress"></div>

        </div>

    </div>

</section>

<!-- Story -->

<section id="story" class="screen">

    <div class="card">

        <div id="heartPhoto">

            <img src="assets/images/shery.png">

        </div>

        <h2 id="typing"></h2>

        <button id="continueBtn">

            Continue

        </button>

    </div>

</section>

<!-- Question -->

<section id="question" class="screen">

    <div class="card">

        <h1>

            Will You

            Be My Friend

            Dear SHERY???

            PLEASSSEEE

            🥹❤️

        </h1>

        <div class="buttons">

            <button id="yesBtn">

                YES❤️

            </button>

            <button id="noBtn">

                NO🙈

            </button>

        </div>

        <p id="funnyText"></p>

    </div>

</section>

<!-- Final -->

<section id="final" class="screen">

    <div class="card">

        <h1 class="finalTitle">

            Thank You

            SHERY!

        </h1>

        <p>

            I hope

            this little surprise

            made you smile.

        </p>

    <img src="assets/images/iceheart.png" class="iceHeart">

        <small>

     Made Especially For SHERY

        </small>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
